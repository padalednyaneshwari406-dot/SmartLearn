<!DOCTYPE html>
<html>
<head>
<title>Colorful Calculator</title>

<style>
body{
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
    background: linear-gradient(135deg, #a18cd1, #fbc2eb);
}

/* Calculator Box */
.calculator{
    background: #222;
    padding: 20px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* Display */
#display{
    width: 100%;
    height: 60px;
    font-size: 25px;
    text-align: right;
    margin-bottom: 15px;
    border: none;
    border-radius: 10px;
    padding: 10px;
    background: #000;
    color: #00ffcc;
}

/* Buttons Grid */
.buttons{
    display: grid;
    grid-template-columns: repeat(4, 60px);
    gap: 10px;
}

/* Button Style */
button{
    height: 60px;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    color: rgb(15, 229, 244);
}

/* Different Colors */
.num{ background: #480d17; }
.op{ background: #b76e79; }
.equal{ background: #ffd194, #ff9a9e; grid-column: span 2; }
.clear{ background: #e74c3c; }

button:hover{
    opacity: 0.8;
}
</style>

</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="op" onclick="append('/')">/</button>
<button class="op" onclick="append('*')">*</button>
<button class="op" onclick="deleteLast()">⌫</button>

<button class="num" onclick="append('7')">7</button>
<button class="num" onclick="append('8')">8</button>
<button class="num" onclick="append('9')">9</button>
<button class="op" onclick="append('-')">-</button>

<button class="num" onclick="append('4')">4</button>
<button class="num" onclick="append('5')">5</button>
<button class="num" onclick="append('6')">6</button>
<button class="op" onclick="append('+')">+</button>

<button class="num" onclick="append('1')">1</button>
<button class="num" onclick="append('2')">2</button>
<button class="num" onclick="append('3')">3</button>
<button class="equal" onclick="calculate()">=</button>

<button class="num" onclick="append('0')">0</button>
<button class="num" onclick="append('.')">.</button>

</div>
</div>

<script>

function append(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function deleteLast(){
    let current = document.getElementById("display").value;
    document.getElementById("display").value = current.slice(0, -1);
}

function calculate(){
    try{
        let result = eval(document.getElementById("display").value);
        document.getElementById("display").value = result;
    } catch {
        document.getElementById("display").value = "Error";
    }
}

</script>

</body>
</html>
